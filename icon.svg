<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="8" fill="#1e78ff"/>
  <!-- 元ジオメトリ（破線・薄色） -->
  <polygon points="9,30 19,14 30,22"
           fill="none" stroke="#bcd6ff" stroke-width="2"
           stroke-dasharray="3,3"/>
  <!-- 変換後ジオメトリ（実線） -->
  <polygon points="18,34 30,20 41,30"
           fill="#ffffff" fill-opacity="0.18"
           stroke="#ffffff" stroke-width="2.5"/>
  <!-- GCP マーカー -->
  <g stroke="#ff5a00" stroke-width="2.5">
    <line x1="15" y1="34" x2="23" y2="34"/>
    <line x1="19" y1="30" x2="19" y2="38"/>
  </g>
  <g stroke="#00e000" stroke-width="2.5">
    <line x1="37" y1="30" x2="45" y2="30"/>
    <line x1="41" y1="26" x2="41" y2="34"/>
  </g>
</svg>
